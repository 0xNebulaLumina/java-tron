syntax = "proto3";

package tron.backend;

// Unified Backend Service - combines all Rust modules
service Backend {
  // Health and metadata
  rpc Health(HealthRequest) returns (HealthResponse);
  rpc GetMetadata(MetadataRequest) returns (MetadataResponse);
  
  // Basic Storage Operations
  rpc Get(GetRequest) returns (GetResponse);
  rpc Put(PutRequest) returns (PutResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  rpc Has(HasRequest) returns (HasResponse);
  
  // Batch Storage Operations
  rpc BatchWrite(BatchWriteRequest) returns (BatchWriteResponse);
  rpc BatchGet(BatchGetRequest) returns (BatchGetResponse);
  
  // Iterator Operations
  rpc Iterator(IteratorRequest) returns (stream IteratorResponse);
  rpc GetKeysNext(GetKeysNextRequest) returns (GetKeysNextResponse);
  rpc GetValuesNext(GetValuesNextRequest) returns (GetValuesNextResponse);
  rpc GetNext(GetNextRequest) returns (GetNextResponse);
  rpc PrefixQuery(PrefixQueryRequest) returns (PrefixQueryResponse);
  
  // Database Management
  rpc InitDB(InitDBRequest) returns (InitDBResponse);
  rpc CloseDB(CloseDBRequest) returns (CloseDBResponse);
  rpc ResetDB(ResetDBRequest) returns (ResetDBResponse);
  rpc IsAlive(IsAliveRequest) returns (IsAliveResponse);
  rpc Size(SizeRequest) returns (SizeResponse);
  rpc IsEmpty(IsEmptyRequest) returns (IsEmptyResponse);
  
  // Transaction Support
  rpc BeginTransaction(BeginTransactionRequest) returns (BeginTransactionResponse);
  rpc CommitTransaction(CommitTransactionRequest) returns (CommitTransactionResponse);
  rpc RollbackTransaction(RollbackTransactionRequest) returns (RollbackTransactionResponse);
  
  // Snapshot Support
  rpc CreateSnapshot(CreateSnapshotRequest) returns (CreateSnapshotResponse);
  rpc DeleteSnapshot(DeleteSnapshotRequest) returns (DeleteSnapshotResponse);
  rpc GetFromSnapshot(GetFromSnapshotRequest) returns (GetFromSnapshotResponse);
  
  // Storage Metadata & Monitoring
  rpc GetStats(GetStatsRequest) returns (GetStatsResponse);
  rpc ListDatabases(ListDatabasesRequest) returns (ListDatabasesResponse);
  rpc StreamMetrics(StreamMetricsRequest) returns (stream MetricsResponse);
  
  // Advanced Database Operations
  rpc CompactRange(CompactRangeRequest) returns (CompactRangeResponse);
  rpc GetProperty(GetPropertyRequest) returns (GetPropertyResponse);
  rpc BackupDatabase(BackupDatabaseRequest) returns (BackupDatabaseResponse);
  rpc RestoreDatabase(RestoreDatabaseRequest) returns (RestoreDatabaseResponse);
  
  // Execution operations
  rpc ExecuteTransaction(ExecuteTransactionRequest) returns (ExecuteTransactionResponse);
  rpc CallContract(CallContractRequest) returns (CallContractResponse);
  rpc EstimateEnergy(EstimateEnergyRequest) returns (EstimateEnergyResponse);
  rpc GetCode(GetCodeRequest) returns (GetCodeResponse);
  rpc GetStorageAt(GetStorageAtRequest) returns (GetStorageAtResponse);
  rpc GetNonce(GetNonceRequest) returns (GetNonceResponse);
  rpc GetBalance(GetBalanceRequest) returns (GetBalanceResponse);
  rpc CreateEvmSnapshot(CreateEvmSnapshotRequest) returns (CreateEvmSnapshotResponse);
  rpc RevertToEvmSnapshot(RevertToEvmSnapshotRequest) returns (RevertToEvmSnapshotResponse);
  
  // Future modules can add their RPCs here via proto includes
}

// Health and Metadata
message HealthRequest {}

message HealthResponse {
  enum Status {
    HEALTHY = 0;
    UNHEALTHY = 1;
    DEGRADED = 2;
  }
  Status status = 1;
  string message = 2;
  map<string, string> module_status = 3; // module_name -> status
}

message MetadataRequest {}

message MetadataResponse {
  string version = 1;
  repeated string enabled_modules = 2;
  map<string, string> module_versions = 3;
  int64 uptime_seconds = 4;
}

// Basic Storage Operations Messages
message GetRequest {
  string database = 1;
  bytes key = 2;
  string snapshot_id = 3; // optional
}

message GetResponse {
  bytes value = 1;
  bool found = 2;
  bool success = 3;
  string error_message = 4;
}

message PutRequest {
  string database = 1;
  bytes key = 2;
  bytes value = 3;
  string transaction_id = 4; // optional
}

message PutResponse {
  bool success = 1;
  string error_message = 2;
}

message DeleteRequest {
  string database = 1;
  bytes key = 2;
  string transaction_id = 3; // optional
}

message DeleteResponse {
  bool success = 1;
  string error_message = 2;
}

message HasRequest {
  string database = 1;
  bytes key = 2;
  string snapshot_id = 3; // optional
}

message HasResponse {
  bool exists = 1;
  bool success = 2;
  string error_message = 3;
}

// Batch Operations Messages
message BatchWriteRequest {
  string database = 1;
  repeated WriteOperation operations = 2;
  string transaction_id = 3; // optional
}

message WriteOperation {
  enum Type {
    PUT = 0;
    DELETE = 1;
  }
  Type type = 1;
  bytes key = 2;
  bytes value = 3; // only for PUT operations
}

message BatchWriteResponse {
  bool success = 1;
  string error_message = 2;
  int32 operations_applied = 3;
}

message BatchGetRequest {
  string database = 1;
  repeated bytes keys = 2;
  string snapshot_id = 3; // optional
}

message BatchGetResponse {
  repeated KeyValue pairs = 1;
  bool success = 2;
  string error_message = 3;
}

message KeyValue {
  bytes key = 1;
  bytes value = 2;
  bool found = 3;
}

// Iterator Operations Messages
message IteratorRequest {
  string database = 1;
  bytes start_key = 2; // optional
  bytes end_key = 3; // optional
  string snapshot_id = 4; // optional
}

message IteratorResponse {
  bytes key = 1;
  bytes value = 2;
  bool end_of_stream = 3;
}

message GetKeysNextRequest {
  string database = 1;
  bytes start_key = 2;
  int32 limit = 3;
  string snapshot_id = 4; // optional
}

message GetKeysNextResponse {
  repeated bytes keys = 1;
  bool success = 2;
  string error_message = 3;
}

message GetValuesNextRequest {
  string database = 1;
  bytes start_key = 2;
  int32 limit = 3;
  string snapshot_id = 4; // optional
}

message GetValuesNextResponse {
  repeated bytes values = 1;
  bool success = 2;
  string error_message = 3;
}

message GetNextRequest {
  string database = 1;
  bytes start_key = 2;
  int32 limit = 3;
  string snapshot_id = 4; // optional
}

message GetNextResponse {
  repeated KeyValue pairs = 1;
  bool success = 2;
  string error_message = 3;
}

message PrefixQueryRequest {
  string database = 1;
  bytes prefix = 2;
  string snapshot_id = 3; // optional
}

message PrefixQueryResponse {
  repeated KeyValue pairs = 1;
  bool success = 2;
  string error_message = 3;
}

// Database Management Messages
message InitDBRequest {
  string database = 1;
  StorageConfig config = 2;
}

message InitDBResponse {
  bool success = 1;
  string error_message = 2;
}

message StorageConfig {
  string engine = 1; // "ROCKSDB" or "LEVELDB"
  map<string, string> engine_options = 2;
  bool enable_statistics = 3;
  int32 max_open_files = 4;
  int64 block_cache_size = 5;
}

message CloseDBRequest {
  string database = 1;
}

message CloseDBResponse {
  bool success = 1;
  string error_message = 2;
}

message ResetDBRequest {
  string database = 1;
}

message ResetDBResponse {
  bool success = 1;
  string error_message = 2;
}

message IsAliveRequest {
  string database = 1;
}

message IsAliveResponse {
  bool alive = 1;
  bool success = 2;
  string error_message = 3;
}

message SizeRequest {
  string database = 1;
}

message SizeResponse {
  int64 size = 1;
  bool success = 2;
  string error_message = 3;
}

message IsEmptyRequest {
  string database = 1;
}

message IsEmptyResponse {
  bool empty = 1;
  bool success = 2;
  string error_message = 3;
}

// Transaction Messages
message BeginTransactionRequest {
  string database = 1;
}

message BeginTransactionResponse {
  string transaction_id = 1;
  bool success = 2;
  string error_message = 3;
}

message CommitTransactionRequest {
  string transaction_id = 1;
}

message CommitTransactionResponse {
  bool success = 1;
  string error_message = 2;
}

message RollbackTransactionRequest {
  string transaction_id = 1;
}

message RollbackTransactionResponse {
  bool success = 1;
  string error_message = 2;
}

// Snapshot Messages
message CreateSnapshotRequest {
  string database = 1;
}

message CreateSnapshotResponse {
  string snapshot_id = 1;
  bool success = 2;
  string error_message = 3;
}

message DeleteSnapshotRequest {
  string snapshot_id = 1;
}

message DeleteSnapshotResponse {
  bool success = 1;
  string error_message = 2;
}

message GetFromSnapshotRequest {
  string snapshot_id = 1;
  bytes key = 2;
}

message GetFromSnapshotResponse {
  bytes value = 1;
  bool found = 2;
  bool success = 3;
  string error_message = 4;
}

// Storage Metadata Messages
message GetStatsRequest {
  string database = 1;
}

message GetStatsResponse {
  StorageStats stats = 1;
  bool success = 2;
  string error_message = 3;
}

message StorageStats {
  int64 total_keys = 1;
  int64 total_size = 2;
  map<string, string> engine_stats = 3;
  int64 last_modified = 4;
}

message ListDatabasesRequest {}

message ListDatabasesResponse {
  repeated string databases = 1;
  bool success = 2;
  string error_message = 3;
}

message StreamMetricsRequest {
  string database = 1; // optional, empty for all databases
}

message MetricsResponse {
  string database = 1;
  map<string, double> metrics = 2;
  int64 timestamp = 3;
}

// Advanced Database Operations
message CompactRangeRequest {
  string database = 1;
  bytes start_key = 2;
  bytes end_key = 3;
}

message CompactRangeResponse {
  bool success = 1;
  string error_message = 2;
}

message GetPropertyRequest {
  string database = 1;
  string property = 2;
}

message GetPropertyResponse {
  string value = 1;
  bool found = 2;
  bool success = 3;
  string error_message = 4;
}

message BackupDatabaseRequest {
  string database = 1;
  string backup_path = 2;
}

message BackupDatabaseResponse {
  bool success = 1;
  string error_message = 2;
}

message RestoreDatabaseRequest {
  string database = 1;
  string backup_path = 2;
}

message RestoreDatabaseResponse {
  bool success = 1;
  string error_message = 2;
}

// Account AEXT (resource usage extension) for pre-execution snapshot
// Captures Java's view of account resource state before execution
message AccountAext {
  int64 net_usage = 1;
  int64 free_net_usage = 2;
  int64 energy_usage = 3;
  int64 latest_consume_time = 4;
  int64 latest_consume_free_time = 5;
  int64 latest_consume_time_for_energy = 6;
  int64 net_window_size = 7;
  bool net_window_optimized = 8;
  int64 energy_window_size = 9;
  bool energy_window_optimized = 10;
}

// Snapshot of an account's AEXT state at a specific address
message AccountAextSnapshot {
  bytes address = 1;  // 21-byte Tron address (0x41 prefix + 20 bytes)
  AccountAext aext = 2;
}

// Execution Messages (preserved from original backend.proto)
message ExecuteTransactionRequest {
  // Note: database field removed - execution uses unified storage context
  TronTransaction transaction = 1;
  ExecutionContext context = 2;
  // Pre-execution AEXT snapshots for hybrid mode
  // Java provides these to ensure AccountInfo serialization matches embedded behavior
  repeated AccountAextSnapshot pre_execution_aext = 3;
}

message ExecuteTransactionResponse {
  ExecutionResult result = 1;
  bool success = 2;
  string error_message = 3;
}

// Transaction Kind enumeration for TRON-accurate processing
enum TxKind {
  NON_VM = 0;  // Non-VM transaction (e.g., TransferContract)
  VM = 1;      // VM transaction (smart contract execution)
}

// TRON Contract Type enumeration - matches Protocol.ContractType
enum ContractType {
  ACCOUNT_CREATE_CONTRACT = 0;
  TRANSFER_CONTRACT = 1;
  TRANSFER_ASSET_CONTRACT = 2;
  VOTE_ASSET_CONTRACT = 3;
  VOTE_WITNESS_CONTRACT = 4;
  WITNESS_CREATE_CONTRACT = 5;
  ASSET_ISSUE_CONTRACT = 6;
  WITNESS_UPDATE_CONTRACT = 8;
  PARTICIPATE_ASSET_ISSUE_CONTRACT = 9;
  ACCOUNT_UPDATE_CONTRACT = 10;
  FREEZE_BALANCE_CONTRACT = 11;
  UNFREEZE_BALANCE_CONTRACT = 12;
  WITHDRAW_BALANCE_CONTRACT = 13;
  UNFREEZE_ASSET_CONTRACT = 14;
  UPDATE_ASSET_CONTRACT = 15;
  PROPOSAL_CREATE_CONTRACT = 16;
  PROPOSAL_APPROVE_CONTRACT = 17;
  PROPOSAL_DELETE_CONTRACT = 18;
  SET_ACCOUNT_ID_CONTRACT = 19;
  CUSTOM_CONTRACT = 20;
  CREATE_SMART_CONTRACT = 30;
  TRIGGER_SMART_CONTRACT = 31;
  GET_CONTRACT = 32;
  UPDATE_SETTING_CONTRACT = 33;
  EXCHANGE_CREATE_CONTRACT = 41;
  EXCHANGE_INJECT_CONTRACT = 42;
  EXCHANGE_WITHDRAW_CONTRACT = 43;
  EXCHANGE_TRANSACTION_CONTRACT = 44;
  UPDATE_ENERGY_LIMIT_CONTRACT = 45;
  ACCOUNT_PERMISSION_UPDATE_CONTRACT = 46;
  CLEAR_ABI_CONTRACT = 48;
  UPDATE_BROKERAGE_CONTRACT = 49;
  SHIELD_CONTRACT = 51;
  MARKET_SELL_ASSET_CONTRACT = 52;
  MARKET_CANCEL_ORDER_CONTRACT = 53;
  FREEZE_BALANCE_V2_CONTRACT = 54;
  UNFREEZE_BALANCE_V2_CONTRACT = 55;
  WITHDRAW_EXPIRE_UNFREEZE_CONTRACT = 56;
  DELEGATE_RESOURCE_CONTRACT = 57;
  UNDELEGATE_RESOURCE_CONTRACT = 58;
  CANCEL_ALL_UNFREEZE_V2_CONTRACT = 59;
}

message TronTransaction {
  bytes from = 1;
  bytes to = 2;
  bytes value = 3;
  bytes data = 4;
  int64 energy_limit = 5;
  int64 energy_price = 6;
  int64 nonce = 7;
  bytes signature = 8;
  int64 timestamp = 9;
  int64 expiration = 10;
  // Tron-specific fields
  int64 bandwidth_limit = 11;
  int64 origin_energy_limit = 12;
  repeated TronResource resources = 13;
  TxKind tx_kind = 14;  // Transaction type for proper processing
  // Phase 3 additions for future TRC-10 support
  ContractType contract_type = 15;  // TRON contract type for detailed classification
  bytes asset_id = 16;             // TRC-10 asset ID for TransferAssetContract (optional)
}

message TronResource {
  enum Type {
    BANDWIDTH = 0;
    ENERGY = 1;
    TRC10 = 2;
    TRC20 = 3;
  }
  Type type = 1;
  bytes token_id = 2; // for TRC10/TRC20
  int64 amount = 3;
}

message ExecutionContext {
  int64 block_number = 1;
  int64 block_timestamp = 2;
  bytes block_hash = 3;
  bytes coinbase = 4;
  int64 energy_limit = 5;
  int64 energy_price = 6;
  string snapshot_id = 7;
  string transaction_id = 8;
}

message ExecutionResult {
  enum Status {
    SUCCESS = 0;
    REVERT = 1;
    OUT_OF_ENERGY = 2;
    INVALID_OPCODE = 3;
    STACK_OVERFLOW = 4;
    STACK_UNDERFLOW = 5;
    INVALID_JUMP = 6;
    PRECOMPILE_ERROR = 7;
    TRON_SPECIFIC_ERROR = 8;
  }
  Status status = 1;
  bytes return_data = 2;
  int64 energy_used = 3;
  int64 energy_refunded = 4;
  repeated StateChange state_changes = 5;
  repeated LogEntry logs = 6;
  string error_message = 7;
  // Tron-specific fields
  int64 bandwidth_used = 8;
  repeated TronResourceUsage resource_usage = 9;
  // Phase 2: Freeze/resource ledger changes
  repeated FreezeLedgerChange freeze_changes = 10;
  repeated GlobalResourceTotalsChange global_resource_changes = 11;
}

// Account information for account changes
message AccountInfo {
  bytes address = 1;
  bytes balance = 2;        // 32-byte big-endian encoded balance
  uint64 nonce = 3;
  bytes code_hash = 4;      // 32-byte hash of the code
  bytes code = 5;           // Contract bytecode (empty for EOAs)

  // Optional resource usage fields (AEXT extension)
  // When present, these are serialized to AEXT tail format in Java
  optional int64 net_usage = 6;
  optional int64 free_net_usage = 7;
  optional int64 energy_usage = 8;
  optional int64 latest_consume_time = 9;
  optional int64 latest_consume_free_time = 10;
  optional int64 latest_consume_time_for_energy = 11;
  optional int64 net_window_size = 12;
  optional bool net_window_optimized = 13;
  optional int64 energy_window_size = 14;
  optional bool energy_window_optimized = 15;
}

// Storage slot change within a contract
message StorageChange {
  bytes address = 1;
  bytes key = 2;            // 32-byte storage key
  bytes old_value = 3;      // 32-byte old value
  bytes new_value = 4;      // 32-byte new value
}

// Account-level change (balance, nonce, code, etc.)
message AccountChange {
  bytes address = 1;
  AccountInfo old_account = 2;  // null/empty if account was created
  AccountInfo new_account = 3;  // null/empty if account was deleted
  bool is_creation = 4;         // true if this is account creation
  bool is_deletion = 5;         // true if this is account deletion (self-destruct)
}

// Union type for different kinds of state changes
message StateChange {
  oneof change {
    StorageChange storage_change = 1;
    AccountChange account_change = 2;
  }
}

message LogEntry {
  bytes address = 1;
  repeated bytes topics = 2;
  bytes data = 3;
}

message TronResourceUsage {
  TronResource.Type type = 1;
  int64 used = 2;
  int64 total = 3;
  bytes token_id = 4; // for TRC10/TRC20
}

// Freeze/resource ledger change emission (Phase 2: emit_freeze_ledger_changes)
// Describes a single freeze or unfreeze operation affecting an owner's resource balance
message FreezeLedgerChange {
  enum Resource {
    BANDWIDTH = 0;
    ENERGY = 1;
    TRON_POWER = 2;
  }

  bytes owner_address = 1;      // 21-byte Tron address (0x41 prefix + 20 bytes)
  Resource resource = 2;         // Resource type being frozen/unfrozen
  int64 amount = 3;              // Absolute value after operation (for idempotency)
  int64 expiration_ms = 4;       // Expiration timestamp in milliseconds since epoch
  bool v2_model = 5;             // true for V2 model, false for legacy V1
}

// Global resource totals change (optional, emitted alongside freeze changes)
// Captures dynamic property updates for total weights and limits
message GlobalResourceTotalsChange {
  int64 total_net_weight = 1;    // Total network weight across all accounts
  int64 total_net_limit = 2;     // Total network bandwidth limit
  int64 total_energy_weight = 3; // Total energy weight across all accounts
  int64 total_energy_limit = 4;  // Total energy limit
}

message CallContractRequest {
  // Note: database field removed - execution uses unified storage context
  bytes from = 1;
  bytes to = 2;
  bytes data = 3;
  ExecutionContext context = 4;
}

message CallContractResponse {
  bytes return_data = 1;
  bool success = 2;
  string error_message = 3;
  int64 energy_used = 4;
}

message EstimateEnergyRequest {
  // Note: database field removed - execution uses unified storage context
  TronTransaction transaction = 1;
  ExecutionContext context = 2;
}

message EstimateEnergyResponse {
  int64 energy_estimate = 1;
  bool success = 2;
  string error_message = 3;
}

message GetCodeRequest {
  // Note: database field removed - execution uses unified storage context
  bytes address = 1;
  string snapshot_id = 2;
}

message GetCodeResponse {
  bytes code = 1;
  bool found = 2;
  bool success = 3;
  string error_message = 4;
}

message GetStorageAtRequest {
  // Note: database field removed - execution uses unified storage context
  bytes address = 1;
  bytes key = 2;
  string snapshot_id = 3;
}

message GetStorageAtResponse {
  bytes value = 1;
  bool found = 2;
  bool success = 3;
  string error_message = 4;
}

message GetNonceRequest {
  // Note: database field removed - execution uses unified storage context
  bytes address = 1;
  string snapshot_id = 2;
}

message GetNonceResponse {
  int64 nonce = 1;
  bool found = 2;
  bool success = 3;
  string error_message = 4;
}

message GetBalanceRequest {
  // Note: database field removed - execution uses unified storage context
  bytes address = 1;
  string snapshot_id = 2;
}

message GetBalanceResponse {
  bytes balance = 1;
  bool found = 2;
  bool success = 3;
  string error_message = 4;
}

message CreateEvmSnapshotRequest {
  // Note: database field removed - execution uses unified storage context
}

message CreateEvmSnapshotResponse {
  string snapshot_id = 1;
  bool success = 2;
  string error_message = 3;
}

message RevertToEvmSnapshotRequest {
  string snapshot_id = 1;
}

message RevertToEvmSnapshotResponse {
  bool success = 1;
  string error_message = 2;
} 
