[server]
host = "127.0.0.1"
port = 50011
max_connections = 1000
keepalive_timeout = 60

[storage]
data_dir = "./data"
max_open_files = 1000
cache_size = 134217728  # 128MB
write_buffer_size = 67108864  # 64MB
max_write_buffer_number = 3
compression = "lz4"

[execution]
max_call_depth = 1024
max_code_size = 24576
max_init_code_size = 49152
enable_london_fork = true
enable_berlin_fork = true
enable_istanbul_fork = true
# Tron-specific
energy_limit = 1000000000  # Increased from 100M to 1B to handle complex transactions
bandwidth_limit = 5000
max_cpu_time_of_one_tx = 80
# TRON Parity: Suppress EVM-style coinbase/miner payouts (default: false for parity)
# Set to true to restore old Ethereum-compatible behavior if needed during rollout
evm_eth_coinbase_compat = false

# TRON Fee Policy Configuration (Phase 2)
[execution.fees]
# Fee handling mode: "burn" (default), "blackhole", or "none"
# - "burn": Fees are burned (no state delta, supply reduction handled elsewhere)
# - "blackhole": Fees are credited to designated blackhole address
# - "none": No fee handling (useful for testing)
mode = "blackhole"

# Whether black hole optimization is supported (matches java-tron's supportBlackHoleOptimization)
support_black_hole_optimization = false

# Base58-encoded TRON address for blackhole (required if mode = "blackhole")
# Example: "TLsV52sRDL79HXGGm9yzwKibb6BeruhUzy"
blackhole_address_base58 = "TLsV52sRDL79HXGGm9yzwKibb6BeruhUzy"

# EXPERIMENTAL: Emit synthetic VM blackhole credits (default: false)
# When enabled, VM transactions will emit estimated fee credits to blackhole
# This is an approximation and should remain off by default to avoid double-counting
experimental_vm_blackhole_credit = false

# Optional flat fee for non-VM transactions in SUN (when not reading from dynamic properties)
# Uncomment to enable flat fee emission for non-VM transactions in blackhole mode
# non_vm_blackhole_credit_flat = 1000000  # 1 TRX in SUN

[modules.storage]
enabled = true
settings = {}

[modules.execution]
enabled = true
settings = {}

# Remote Execution Feature Flags
[execution.remote]
# Global enable/disable for remote system contract execution
system_enabled = true

# Specific contract type flags
witness_create_enabled = true
witness_update_enabled = true
vote_witness_enabled = true

# TRC-10 transfers (requires additional storage support)
trc10_enabled = true

# TRC-10 extension contracts (Phase 2.E)
participate_asset_issue_enabled = true
unfreeze_asset_enabled = true
update_asset_enabled = true

# FreezeBalanceContract execution (Phase 2: balance delta + resource ledger)
# Set to true to enable remote execution of FreezeBalanceContract
# Default: false for safe rollout - falls back to Java embedded execution when disabled
freeze_balance_enabled = true
unfreeze_balance_enabled = true
freeze_balance_v2_enabled = true
unfreeze_balance_v2_enabled = true

# WithdrawBalanceContract execution (Phase 1: uses Account.allowance only)
# Set to true to enable remote execution of WithdrawBalanceContract
# Phase 1 uses allowance only - skips delegation/mortgage reward computation
# Balance delta applied by AccountChange; Java applies allowance=0 and latestWithdrawTime via sidecar
# Default: false for safe rollout - falls back to Java embedded execution when disabled
withdraw_balance_enabled = true

# Emit freeze/resource ledger changes in ExecutionResult (Phase 2)
# When true, emits FreezeLedgerChange messages describing freeze/unfreeze operations
# These changes are applied to Java's local stores (AccountStore, DynamicPropertiesStore)
# so BandwidthProcessor sees updated netLimit for subsequent txs in the same block.
# Default: false to maintain CSV parity with Phase 1 (only AccountChange)
# When enabled, Java applies these changes via RuntimeSpiImpl.applyFreezeLedgerChanges()
# Affects: FreezeBalance, UnfreezeBalance, FreezeBalanceV2, UnfreezeBalanceV2,
#          DelegateResource, UnDelegateResource, WithdrawExpireUnfreeze, CancelAllUnfreezeV2
emit_freeze_ledger_changes = true

# Emit GlobalResourceTotalsChange alongside freeze/unfreeze operations (Phase 2)
# When true, backend computes and sends total net/energy weight and limits after each freeze/unfreeze
# so Java can update DynamicPropertiesStore.totalNetWeight/totalNetLimit immediately.
# This fixes the FREE_NET vs ACCOUNT_NET divergence where Java's BandwidthProcessor computed netLimit=0
# because totalNetWeight hadn't been updated yet for freeze operations in the same block.
# Default: false for backward compatibility; set true for Phase 2 parity runs.
# When enabled, Java applies these changes via RuntimeSpiImpl.applyGlobalResourceChange()
# Affects: FreezeBalance, UnfreezeBalance, FreezeBalanceV2, UnfreezeBalanceV2
emit_global_resource_changes = true

# Emit storage changes for witness/vote data (may affect CSV output)
emit_storage_changes = false

# AEXT (Account EXTension) presence mode for AccountInfo serialization
# Controls how the 76-byte AEXT tail (resource usage fields) is populated in proto AccountInfo
# Modes:
#   - "none": All resource fields set to None (current behavior, remote omits AEXT tail)
#   - "zeros": Set Some(0)/false for EOAs (enables AEXT presence parity with embedded)
#   - "defaults": Set window sizes to 28800, other fields to 0/false for EOAs (matches embedded defaults exactly)
#   - "tracked": Some(real values) when backend supports resource metrics (future)
#   - "hybrid": Prefer pre-execution AEXT values passed from Java, fall back to defaults (recommended for parity)
# Default: "none" for backward compatibility
# Recommendation: Set to "hybrid" for full CSV digest parity with embedded execution
# In "hybrid" mode, Java passes its pre-execution resource usage values via gRPC, and the Rust backend
# echoes these values in AccountInfo for both old and new accounts, ensuring byte-level parity for unchanged fields.
accountinfo_aext_mode = "hybrid"

# Seed old_votes from Account.votes on first VotesRecord creation (matches embedded behavior)
# When true: On first VoteWitness for an account, old_votes is seeded from Account.votes field
# When false: On first VoteWitness, old_votes is empty (legacy remote behavior)
# This flag ensures maintenance vote delta computation is correct (new_votes - old_votes)
# Default: true to match embedded semantics
vote_witness_seed_old_from_account = true

# AccountCreateContract execution (creates new accounts with fee charging)
# Set to true to enable remote execution of AccountCreateContract
# Default: false for safe rollout - falls back to Java embedded execution when disabled
account_create_enabled = true

# DEPRECATED: Delegation reward is now always computed when CHANGE_DELEGATION dynamic property
# is enabled, matching Java's MortgageService.withdrawReward() which self-gates on
# allowChangeDelegation(). This field is kept for backward config compatibility but has no effect.
delegation_reward_enabled = true

# Genesis guard representative addresses (Base58-encoded TRON addresses)
# These witnesses from the genesis block are not allowed to withdraw balance, matching Java's
# CommonParameter.getInstance().getGenesisBlock().getWitnesses() check.
# When empty (default), falls back to built-in mainnet/testnet genesis witness lists.
# Set this for custom/private networks with different genesis witnesses.
# genesis_guard_representatives_base58 = ["T...", "T..."]

# === Phase 0.3: Write Consistency Model ===
# This flag controls whether Rust persists state changes directly to storage during commit.
#
# The system has two potential write paths:
# 1. Rust handler directly writes to RocksDB via storage_adapter.set_*
# 2. Java RuntimeSpiImpl applies state_changes/sidecars to local database
#
# To ensure idempotent semantics and avoid double-writes:
# - When false (default/recommended): Rust only computes and returns changes via gRPC
#   Java's RuntimeSpiImpl handles all persistence. This is Option A from the planning doc.
# - When true: Rust writes to storage AND returns changes (legacy mode, risk of double-write)
#   Only enable for testing or when Java apply is disabled.
#
# Benefits of false (Option A):
# - Single authoritative write path (Java)
# - Works consistently for both EMBEDDED and REMOTE storage modes
# - Avoids non-idempotent double-writes (e.g., TRC-10 delta semantics)
# - Easier transaction rollback on validation failure
#
# LD-1/LD-2 locked target state (planning/close_loop.planning.md §§ LD-1, LD-2):
# the canonical RR writer is the Java RuntimeSpiImpl apply path (LD-1), so for
# production RR this flag MUST be false — the checked-in value below matches
# the code default (common/src/config.rs) and the LD-2 lock. Setting it to true
# is reserved for conformance / isolation / local development profiles only.
# In-tree, the conformance runner (crates/core/src/conformance/runner.rs)
# is the one force-true caller; it flips the flag internally rather than
# reading it from this file. Any other dev / experiment use of rust_persist = true
# is expected to override the flag locally (via the `TRON_BACKEND__...`
# environment variable, or a local `config.toml` edit/replacement in the
# developer's own working copy), not by changing this checked-in value. Note this flag does NOT cover
# the separate NonVm buffered-write bypass (grpc/mod.rs), which is tracked as
# its own open item in §4 LD-11 and is orthogonal to the LD-2 write-path lock.
rust_persist_enabled = false

# Dynamic property strictness (Task 5 - Java parity)
# When true: Methods like get_asset_issue_fee_strict() return errors when keys are missing
# When false: Uses safe defaults (backward compatible behavior)
# Set to true for conformance testing or strict Java parity
strict_dynamic_properties = true

# Genesis block timestamp (milliseconds) for headSlot computation
# Used in bandwidth resource tracking: headSlot = (block_timestamp - genesis_block_timestamp) / 3000
# Default: 1529891469000 (TRON mainnet genesis block timestamp)
genesis_block_timestamp = 1529891469000

market_strict_index_parity = true

# Genesis Account Initialization
# Pre-populate accounts with initial balances at startup for testing/parity.
# This ensures the Rust storage has the same initial state as mainnet at a given starting block.
[genesis]
enabled = true

# Genesis accounts to initialize
# Each account needs: address (Base58), balance_sun (i64), optional comment
[[genesis.accounts]]
address = "TLsV52sRDL79HXGGm9yzwKibb6BeruhUzy"
# This is the blackhole address. Set balance_sun to match the accumulated fees
# from block 0 up to your test's starting block.
# For early mainnet blocks, this should be the accumulated fees from previous transactions.
# Value from embedded test at block 1785: -9223372036854075808 (raw bytes: 0x80000000000aae60)
# IMPORTANT: Adjust this value based on your specific test scenario and starting block.
balance_sun = -9223372036854075808
comment = "Blackhole address - receives system fees when support_black_hole_optimization=false"

